<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
<meta name="theme-color" content="#050505" />
<title>Rich Message Builder</title>
<style>
  :root{
    --bg:#0d1723;
    --bg-soft:#101b28;
    --top:#050505;
    --notice:#1d2a3b;
    --panel:#172432;
    --panel2:#1a2837;
    --panel3:#203143;
    --panel4:#0f1a28;
    --line:#263747;
    --line2:#41566a;
    --text:#f4f7fb;
    --muted:#8194aa;
    --muted2:#5f7388;
    --accent:#2aabee;
    --accent2:#34b5f4;
    --danger:#ff6675;
    --danger-bg:#352432;
    --shadow:0 12px 28px rgba(0,0,0,.35);
  }

  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{min-height:100%;height:100%;margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,Helvetica,sans-serif;-webkit-font-smoothing:antialiased}
  body{overflow:hidden}
  button,input,textarea,select{font:inherit;color:inherit}
  button{border:0;background:none;padding:0;cursor:pointer}
  input,textarea,select{outline:0;border:0;background:transparent}

  #app{width:100vw;height:100dvh;min-height:100dvh;background:var(--bg);display:flex;flex-direction:column;overflow:hidden;position:relative}

  /* App topbar sengaja disembunyikan agar tidak dobel dengan bar browser / GitHub Pages.
     Tambahkan ?topbar=1 di URL kalau ingin mode standalone dengan topbar internal. */
  .app-topbar{height:76px;background:var(--top);display:none;align-items:center;gap:18px;padding:0 24px;flex:0 0 auto}
  body.show-topbar .app-topbar{display:flex}
  .topbar-title{font-size:24px;font-weight:850;letter-spacing:-.55px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
  .top-icon{width:31px;height:31px;display:grid;place-items:center;color:#fff;opacity:.98}
  .top-icon svg{width:31px;height:31px;stroke:currentColor;stroke-width:2.8;fill:none;stroke-linecap:round;stroke-linejoin:round}
  .top-icon.more svg{stroke-width:3.6}

  .notice{flex:0 0 auto;background:var(--notice);border-bottom:1px solid rgba(255,255,255,.08);min-height:64px;display:flex;align-items:center;justify-content:center;text-align:center;color:#dce3ec;font-size:17px;line-height:1.36;padding:10px 24px 12px;white-space:normal}
  .notice b{font-weight:850;color:#fff}

  #screen{flex:1 1 auto;min-height:0;background:var(--bg);position:relative;overflow:hidden}

  /* HOME */
  .home{height:100%;overflow-y:auto;padding:32px 24px 120px;background:var(--bg)}
  .home-head{display:flex;align-items:flex-start;gap:14px;margin-bottom:28px}
  .brand-copy{min-width:0;flex:1}
  .brand-title{font-size:38px;line-height:1.02;font-weight:900;letter-spacing:-1.1px;margin:8px 0 8px}
  .brand-sub{font-size:18px;line-height:1.25;color:var(--muted)}
  .home-tools{display:flex;gap:10px;align-items:center;margin-top:8px;flex-shrink:0}
  .lang-pill{height:56px;min-width:128px;border-radius:30px;background:#172331;box-shadow:var(--shadow);display:flex;align-items:center;justify-content:center;gap:9px;color:#8093a9;font-size:17px;font-weight:750}
  .lang-pill .globe{font-size:24px;color:var(--accent)}
  .theme-pill{width:56px;height:56px;border-radius:50%;background:#172331;box-shadow:var(--shadow);display:grid;place-items:center;color:#8093a9;font-size:23px}
  .primary-big{height:64px;width:100%;border-radius:22px;background:linear-gradient(#34b5f4,#2aa9eb);color:white;font-size:21px;font-weight:850;display:flex;align-items:center;justify-content:center;gap:18px;margin:2px 0 38px;box-shadow:0 10px 24px rgba(42,171,238,.18)}
  .primary-big .plus{font-size:42px;font-weight:250;line-height:0;transform:translateY(-2px)}
  .section-row{display:flex;align-items:center;justify-content:space-between;margin:0 8px 18px}
  .section-row h2,.section-title{margin:0;color:var(--muted);text-transform:uppercase;letter-spacing:2.6px;font-size:16px;font-weight:850}
  .manage-link{color:#54bdf5;font-size:18px;font-weight:500}
  .channel-card{height:88px;width:100%;border-radius:21px;background:var(--panel2);display:flex;align-items:center;gap:18px;padding:0 24px;box-shadow:0 8px 18px rgba(0,0,0,.30);margin-bottom:38px;text-align:left}
  .avatar{width:56px;height:56px;border-radius:50%;background:linear-gradient(145deg,#13c3e8,#078cc5);color:#fff;font-size:25px;font-weight:900;display:grid;place-items:center;flex:0 0 auto}
  .avatar.small{width:48px;height:48px;font-size:22px}
  .avatar.tiny{width:48px;height:48px;font-size:22px}
  .channel-name{font-size:20px;font-weight:850;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .channel-sub{font-size:17px;color:var(--muted);margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .chev-right{margin-left:auto;color:#8799ad;font-size:30px;font-weight:250}
  .empty-draft{height:116px;border:1.5px dashed #304255;border-radius:22px;display:flex;align-items:center;justify-content:center;text-align:center;color:#8498ad;font-size:18px;padding:0 18px}
  .draft-card-home{border-radius:22px;background:rgba(25,38,53,.86);border:1px solid rgba(255,255,255,.03);padding:18px 20px;box-shadow:0 8px 18px rgba(0,0,0,.25);width:100%;text-align:left}
  .draft-top{display:flex;justify-content:space-between;gap:12px;color:var(--muted);font-size:14px;margin-bottom:8px}
  .draft-title{font-weight:850;font-size:20px;margin-bottom:6px;color:#fff}
  .draft-snippet{font-size:16px;color:#c6d2dd;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

  /* BUILDER */
  .builder{height:100%;display:flex;flex-direction:column;min-height:0;background:var(--bg)}
  .channel-row{height:64px;flex:0 0 auto;display:flex;align-items:center;gap:12px;padding:0 16px 0 24px;border-bottom:1px solid rgba(255,255,255,.06);background:#0f1a27}
  .back-btn{width:32px;height:44px;color:#5ec5fb;font-size:36px;line-height:1;display:grid;place-items:center;font-weight:250;flex:0 0 auto}
  .channel-pill{height:48px;min-width:0;max-width:50vw;border-radius:26px;background:#172432;display:flex;align-items:center;gap:10px;padding:0 18px 0 10px;color:#fff;box-shadow:0 8px 22px rgba(0,0,0,.18);flex:1 1 auto;text-align:left}
  .channel-pill .avatar{width:48px;height:48px;font-size:22px;margin-left:-10px}
  .pill-name{font-size:21px;font-weight:850;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
  .caret{color:#7f91a8;font-size:12px;margin-left:auto;flex:0 0 auto}
  .tabs{height:50px;border-radius:26px;background:#101b28;padding:4px;display:flex;align-items:center;gap:0;flex:0 0 auto}
  .tabs button{height:42px;min-width:86px;padding:0 16px;border-radius:22px;color:#7f91a8;font-size:18px;font-weight:850;white-space:nowrap}
  .tabs button.active{background:var(--accent);color:white;box-shadow:0 6px 15px rgba(42,171,238,.24)}
  .editor{flex:1 1 auto;min-height:0;overflow-y:auto;position:relative;background:var(--bg);padding:22px 14px 198px;-webkit-overflow-scrolling:touch}
  .editor.preview-mode{background-color:var(--bg);background-image:radial-gradient(rgba(87,111,137,.16) 1.35px, transparent 1.35px);background-size:26px 26px;padding:18px 18px 198px}
  .empty-canvas{min-height:122px;border:1.5px dashed #304255;border-radius:18px;color:#8296ac;display:flex;align-items:center;justify-content:center;text-align:center;font-size:17px;line-height:1.35;margin:2px 10px 34px;padding:0 22px}
  .divider-line{height:1px;background:rgba(255,255,255,.08);margin:16px 10px 22px}
  .editor .section-title{font-size:15px;letter-spacing:2.1px;margin:0 10px 8px}
  .section-desc{color:#7f91a8;font-size:16px;line-height:1.36;margin:0 10px 20px}
  .add-btn-dashed{min-height:54px;border-radius:18px;border:1.5px dashed #41566a;display:flex;align-items:center;justify-content:center;color:var(--accent);font-size:18px;font-weight:850;margin:0 10px 22px;padding:0 20px;gap:10px}
  .add-btn-dashed .plus{font-size:28px;font-weight:250;line-height:0;transform:translateY(-1px)}

  .block-wrap{display:flex;align-items:stretch;margin:4px 0 16px;position:relative}
  .drag{width:40px;flex:0 0 40px;display:flex;align-items:flex-start;justify-content:center;padding-top:24px}
  .dots{display:grid;grid-template-columns:repeat(2,4px);grid-auto-rows:4px;gap:6px;opacity:.9}
  .dots i{width:4px;height:4px;border-radius:50%;background:#536578;display:block}
  .block-card{flex:1;min-width:0;border-radius:22px;background:var(--panel2);overflow:hidden;border:1px solid rgba(255,255,255,.025)}
  .block-inner{padding:18px 20px}
  .rich-line{width:100%;outline:none;background:transparent;color:#f4f7fb;margin:0;padding:0;white-space:pre-wrap;word-break:break-word;min-height:28px}
  .rich-line:empty:before,.fold-title:empty:before,.fold-text:empty:before{content:attr(data-placeholder);color:#66798d;font-weight:700}
  .title-line{font-size:28px;line-height:1.18;font-weight:900;letter-spacing:-.35px;min-height:36px}
  .text-line{font-size:20px;line-height:1.42;font-weight:520;min-height:31px}
  .quote-line{font-size:22px;line-height:1.33;font-weight:800;border-left:4px solid var(--accent);padding-left:14px;min-height:34px}
  .footer-line{font-size:15px;line-height:1.36;color:#c8d2de;font-weight:650;min-height:25px}
  .code-line{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:15px;font-weight:650;line-height:1.45;background:#101a25;border:1px solid var(--line);border-radius:12px;padding:12px;min-height:48px}
  .level-panel{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:18px}
  .levels{display:flex;align-items:center;gap:8px;min-width:0;flex-wrap:nowrap}
  .levels button{height:34px;min-width:38px;border-radius:10px;background:#243446;color:#7c8ea3;font-size:15px;font-weight:850;padding:0 10px}
  .levels button.active{background:var(--accent);color:#fff}
  .type-label{color:#8496aa;text-transform:uppercase;letter-spacing:1.9px;font-size:13px;font-weight:850;white-space:nowrap}
  .block-actions{display:flex;align-items:center;gap:10px;margin-top:16px;flex-wrap:wrap}
  .action-btn{min-height:38px;border-radius:12px;background:#263749;color:#f1f5f9;font-size:16px;font-weight:850;padding:8px 14px;display:inline-flex;align-items:center;gap:8px;white-space:nowrap}
  .action-btn svg{width:18px;height:18px;stroke:currentColor;stroke-width:2.4;fill:none;stroke-linecap:round;stroke-linejoin:round}
  .action-btn.danger{color:var(--danger);background:var(--danger-bg)}
  .action-row-end{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:12px;flex-wrap:wrap}
  .right-actions{display:flex;gap:10px;align-items:center;margin-left:auto;flex-wrap:wrap}

  .rule-card{display:flex;align-items:center;gap:12px;height:42px}
  .rule-line{height:1px;background:#304154;flex:1}
  .rule-dot{width:7px;height:7px;background:#5d7083;border-radius:50%}
  .table-grid{border:1px solid var(--line);border-radius:16px;overflow:hidden;background:#142232}
  .table-row{display:grid;border-top:1px solid var(--line)}
  .table-row:first-child{border-top:0}
  .table-cell{width:100%;min-width:0;min-height:54px;border:0;border-right:1px solid var(--line);background:#142232;color:#fff;outline:0;padding:14px;font-size:18px;font-weight:400}
  .table-cell:last-child{border-right:0}
  .table-row.header .table-cell{background:#1d3547;font-weight:700;color:#f2f6fa}
  .table-tools{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:14px}
  .chip{min-height:38px;border-radius:12px;background:#263749;color:#f5f7fb;padding:8px 12px;font-size:16px;font-weight:850;white-space:nowrap}
  .chip.active{background:var(--accent);color:white}
  .fold-box{border:1px solid var(--line);border-radius:16px;overflow:hidden;background:#142232}
  .fold-head{display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--line);min-height:54px;padding:0 14px;color:#f5f7fb}
  .fold-head .triangle{color:#8aa0b7;font-size:16px;width:20px;flex:0 0 auto}
  .fold-title{font-size:20px;font-weight:850;outline:none;min-height:28px;flex:1;white-space:pre-wrap;word-break:break-word}
  .fold-body{padding:15px 14px;min-height:58px}
  .fold-text{font-size:20px;font-weight:520;outline:none;min-height:30px;white-space:pre-wrap;word-break:break-word}

  .button-list{display:flex;flex-direction:column;gap:12px;margin:0 10px 18px}
  .inline-card{border-radius:18px;background:var(--panel2);border:1px solid rgba(255,255,255,.025);padding:14px 16px}
  .inline-grid{display:grid;grid-template-columns:1fr 112px;gap:10px;margin-bottom:10px}
  .field{height:44px;border-radius:12px;background:#142232;border:1px solid var(--line);padding:0 12px;color:#fff;font-size:16px;min-width:0}
  .field::placeholder{color:#63788d}
  select.field{appearance:none;background:#142232;color:#fff}
  .inline-actions{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;margin-top:10px}

  .format-toolbar{position:fixed;left:12px;right:12px;top:calc(env(safe-area-inset-top) + 76px);height:54px;border-radius:16px;background:#1a2837;border:1px solid #223547;box-shadow:0 8px 22px rgba(0,0,0,.48);z-index:80;display:none;align-items:center;justify-content:space-around;padding:0 6px}
  body:not(.show-topbar) .format-toolbar{top:76px}
  .format-toolbar.show{display:flex}
  .fmt-btn{width:43px;height:43px;border-radius:12px;color:#e8eef5;font-size:20px;font-weight:900;display:grid;place-items:center}
  .fmt-btn.active{background:#214157;color:#7fd4ff}
  .fmt-btn.muted{color:#899aab}
  .fmt-btn small{font-size:13px;font-weight:900}

  .fab-wrap{position:absolute;left:0;right:0;bottom:168px;display:flex;justify-content:center;z-index:50;pointer-events:none}
  .fab{height:58px;border-radius:31px;background:#172432;border:1px solid #25394a;box-shadow:0 8px 22px rgba(0,0,0,.35);color:var(--accent);font-size:18px;font-weight:850;padding:0 34px;display:flex;align-items:center;gap:12px;pointer-events:auto}
  .fab .plus{font-size:30px;font-weight:250;line-height:0;transform:translateY(-1px)}
  .builder-bottom{position:absolute;left:0;right:0;bottom:0;z-index:55;background:var(--bg)}
  .save-draft{height:72px;width:100%;background:#152231;border-top:1px solid rgba(255,255,255,.08);color:var(--accent);font-weight:850;font-size:18px;display:flex;align-items:center;justify-content:center;text-align:center}
  .post-btn{height:62px;width:100%;background:var(--accent);color:#fff;font-size:21px;font-weight:950;letter-spacing:2.6px;display:block;text-align:center}
  .post-btn:disabled{color:rgba(255,255,255,.58);filter:saturate(.65);cursor:not-allowed}

  /* SHEET */
  .sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,.62);z-index:100;display:none;align-items:flex-end;justify-content:center}
  .sheet-overlay.open{display:flex}
  .sheet{width:100%;max-height:80dvh;overflow-y:auto;background:#172432;border-radius:26px 26px 0 0;box-shadow:0 -15px 38px rgba(0,0,0,.5);padding:16px 28px 34px}
  .sheet-handle{width:68px;height:6px;border-radius:5px;background:#354657;margin:0 auto 26px;opacity:.75}
  .sheet h2{font-size:26px;line-height:1;margin:0 0 26px;font-weight:850;letter-spacing:-.4px}
  .grid-title{color:#8295aa;letter-spacing:1.6px;text-transform:uppercase;font-size:15px;font-weight:850;margin:30px 0 18px}
  .block-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:28px 22px}
  .block-opt{display:flex;flex-direction:column;align-items:center;gap:12px;color:#8194a9;min-width:0}
  .block-ic{width:66px;height:66px;border-radius:20px;background:#0f1a28;display:grid;place-items:center;color:var(--accent);font-size:30px;font-weight:950}
  .block-ic svg{width:36px;height:36px;stroke:currentColor;stroke-width:1.9;fill:none;stroke-linecap:round;stroke-linejoin:round}
  .block-opt span{font-size:16px;line-height:1.1;font-weight:500;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}

  /* PREVIEW */
  .preview-wrap{min-height:100%;padding:18px 4px 80px}
  .day-pill{display:table;margin:0 auto 28px;background:rgba(5,10,16,.74);color:white;border-radius:14px;padding:5px 16px;font-size:16px;font-weight:750}
  .bubble{width:100%;background:#172432;border-radius:21px;padding:18px 24px 8px;box-shadow:0 10px 22px rgba(0,0,0,.25);overflow:hidden}
  .bubble-from{font-size:18px;font-weight:850;color:#63c6fb;margin:0 0 28px}
  .bubble-content{font-size:20px;line-height:1.42;color:#f3f7fb;word-break:break-word}
  .bubble-content h1,.bubble-content h2,.bubble-content h3,.bubble-content h4,.bubble-content h5,.bubble-content h6{margin:0 0 18px;font-weight:900;letter-spacing:-.5px;line-height:1.12;color:#fff}
  .bubble-content h1{font-size:38px}.bubble-content h2{font-size:32px}.bubble-content h3{font-size:28px}.bubble-content h4{font-size:24px}.bubble-content h5{font-size:22px}.bubble-content h6{font-size:20px}
  .bubble-content p{margin:0 0 16px}.bubble-content .footer{color:#bdc9d5;font-size:14px}.bubble-content blockquote{border-left:3px solid var(--accent);margin:0 0 16px;padding:0 0 0 12px;font-size:20px;font-weight:750}
  .preview-rule{display:flex;align-items:center;gap:13px;margin:4px 0 28px}.preview-rule .line{height:1px;background:#304155;flex:1}.preview-rule .dot{width:7px;height:7px;background:#5f7489;border-radius:50%}
  .preview-table{width:100%;border-collapse:separate;border-spacing:0;margin:0 0 20px;overflow:hidden;border:1px solid var(--line);border-radius:15px;font-size:18px;table-layout:fixed}
  .preview-table th,.preview-table td{border-right:1px solid var(--line);border-bottom:1px solid var(--line);padding:13px 16px;text-align:left;font-weight:500;height:54px}
  .preview-table tr:last-child td{border-bottom:0}.preview-table td:last-child,.preview-table th:last-child{border-right:0}.preview-table th{background:#1e3547;color:#fff;font-weight:850}
  .preview-details{border:1px solid var(--line);border-radius:15px;overflow:hidden;background:#172432;margin:0 0 18px}
  .preview-details summary{list-style:none;display:flex;align-items:center;gap:12px;min-height:56px;padding:0 18px;font-size:21px;font-weight:900;color:#f5f7fb;cursor:pointer;background:#1b2a38}
  .preview-details summary::-webkit-details-marker{display:none}.preview-details summary:before{content:'›';color:#879bb0;font-size:28px;line-height:1;transition:.16s}.preview-details[open] summary:before{transform:rotate(90deg)}
  .preview-details .details-body{border-top:1px solid var(--line);padding:18px;font-size:21px;color:#f6f8fb}
  .inline-preview{display:grid;grid-template-columns:1fr;gap:8px;margin:14px 0 8px}
  .inline-preview a,.inline-preview button{height:44px;border-radius:13px;background:#223247;color:#77d2ff;font-size:17px;font-weight:850;display:flex;align-items:center;justify-content:center;text-decoration:none}
  .bubble-meta{display:flex;justify-content:flex-end;align-items:center;gap:10px;color:#7f93a8;font-size:17px;margin-top:5px;font-weight:500}
  .eye{width:22px;height:16px;border:2px solid currentColor;border-radius:50%/65%;display:inline-block;position:relative;opacity:.95}.eye:after{content:'';position:absolute;left:50%;top:50%;width:6px;height:6px;border-radius:50%;background:currentColor;transform:translate(-50%,-50%)}

  .toast{position:fixed;z-index:200;left:50%;bottom:150px;transform:translateX(-50%);max-width:min(420px,calc(100% - 44px));background:#eef2f6;color:#0b1017;border-radius:24px;padding:12px 18px;text-align:center;font-size:15px;font-weight:750;box-shadow:0 14px 30px rgba(0,0,0,.35);display:none}
  .toast.show{display:block;animation:pop .16s ease-out}@keyframes pop{from{transform:translateX(-50%) translateY(10px);opacity:0}to{transform:translateX(-50%) translateY(0);opacity:1}}

  @media (max-width:390px){
    .notice{font-size:16px;padding-left:18px;padding-right:18px}.home{padding-left:20px;padding-right:20px}.brand-title{font-size:34px}.lang-pill{min-width:112px;font-size:16px}.theme-pill{width:52px;height:52px}.channel-row{padding-left:18px;gap:8px}.channel-pill{max-width:49vw}.pill-name{font-size:20px}.tabs button{min-width:75px;font-size:16px;padding:0 12px}.levels{gap:6px}.levels button{min-width:34px;padding:0 8px}.block-grid{gap:24px 16px}.block-ic{width:62px;height:62px}.block-opt span{font-size:15px}.sheet{padding-left:24px;padding-right:24px}.title-line{font-size:26px}.bubble{padding-left:20px;padding-right:20px}.bubble-content h2{font-size:30px}.preview-table{font-size:16px}.preview-table th,.preview-table td{padding:12px 14px}.action-btn,.chip{font-size:15px;padding-left:10px;padding-right:10px}.inline-grid{grid-template-columns:1fr}.format-toolbar{left:8px;right:8px}.fmt-btn{width:35px;font-size:17px}
  }
</style>
</head>
<body>
<div id="app">
  <header class="app-topbar">
    <button class="top-icon" id="topClose" aria-label="Tutup"><svg viewBox="0 0 24 24"><path d="M5 5l14 14M19 5L5 19"/></svg></button>
    <div class="topbar-title">Rich Message Builder</div>
    <button class="top-icon" aria-label="Buka menu"><svg viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg></button>
    <button class="top-icon more" aria-label="Opsi"><svg viewBox="0 0 24 24"><path d="M12 5.5h.01M12 12h.01M12 18.5h.01"/></svg></button>
  </header>
  <div class="notice"><span>⏳&nbsp; Draft &amp; pesan terkirim hanya disimpan <b>maksimal 30 menit</b> di server, lalu dihapus otomatis.</span></div>
  <main id="screen"></main>
</div>

<div class="format-toolbar" id="formatToolbar" aria-hidden="true">
  <button class="fmt-btn active" data-cmd="bold"><b>B</b></button>
  <button class="fmt-btn" data-cmd="italic"><i>I</i></button>
  <button class="fmt-btn" data-cmd="underline"><u>U</u></button>
  <button class="fmt-btn" data-cmd="strikeThrough"><s>S</s></button>
  <button class="fmt-btn muted" type="button">◖</button>
  <button class="fmt-btn active" type="button">A</button>
  <button class="fmt-btn" data-cmd="formatBlock" data-value="pre">&lt;/&gt;</button>
  <button class="fmt-btn" type="button"><small>x<sub>2</sub></small></button>
  <button class="fmt-btn" type="button"><small>x<sup>2</sup></small></button>
  <button class="fmt-btn" type="button">↗</button>
</div>

<div class="sheet-overlay" id="sheetOverlay">
  <div class="sheet" role="dialog" aria-modal="true" aria-labelledby="sheetTitle">
    <div class="sheet-handle"></div>
    <h2 id="sheetTitle">Tambah Blok</h2>
    <div class="block-grid" id="blockGridTop"></div>
    <div class="grid-title">BARU · BOT API 10.1</div>
    <div class="block-grid" id="blockGridNew"></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
(function(){
  "use strict";
  const STORAGE_KEY = "tinta_rich_message_builder_clean_v2";
  const DRAFT_TTL = 30 * 60 * 1000;
  const CHANNEL = { name:"With Kinn", username:"@kinnthaii", subs:"5 pelanggan", avatar:"W" };
  const state = { screen:"builder", mode:"write", blocks:[], buttons:[], lastSavedAt:null };

  if(new URLSearchParams(location.search).get("topbar") === "1") document.body.classList.add("show-topbar");

  const screen = document.getElementById("screen");
  const overlay = document.getElementById("sheetOverlay");
  const toolbar = document.getElementById("formatToolbar");
  const toast = document.getElementById("toast");

  const icon = {
    foto:`<svg viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="14" rx="3"/><path d="M8 13l2.5-2.5L14 14l2-2 3 3"/><circle cx="9" cy="9" r="1.2"/></svg>`,
    slideshow:`<svg viewBox="0 0 24 24"><rect x="6" y="6" width="13" height="12" rx="3"/><path d="M4 9v7a3 3 0 0 0 3 3h8"/></svg>`,
    audio:`<svg viewBox="0 0 24 24"><path d="M5 10v4M9 7v10M13 5v14M17 8v8M21 11v2"/></svg>`,
    pin:`<svg viewBox="0 0 24 24"><path d="M12 21v-7"/><circle cx="12" cy="8" r="5"/></svg>`,
    table:`<svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="16" rx="3"/><path d="M3 10h18M9 4v16M15 4v16"/></svg>`,
    video:`<svg viewBox="0 0 24 24"><rect x="3" y="6" width="13" height="12" rx="3"/><path d="M16 10l5-3v10l-5-3z"/></svg>`,
    mic:`<svg viewBox="0 0 24 24"><rect x="9" y="3" width="6" height="11" rx="3"/><path d="M5 11a7 7 0 0 0 14 0M12 18v3M9 21h6"/></svg>`,
    fold:`<svg viewBox="0 0 24 24"><rect x="4" y="5" width="16" height="14" rx="3"/><path d="M7 11l4 4 7-8"/></svg>`,
    collage:`<svg viewBox="0 0 24 24"><rect x="4" y="4" width="6" height="6" rx="1"/><rect x="14" y="4" width="6" height="6" rx="1"/><rect x="4" y="14" width="6" height="6" rx="1"/><rect x="14" y="14" width="6" height="6" rx="1"/></svg>`
  };
  const blockDefsTop = [
    {type:"judul", label:"Judul", html:"H"},{type:"paragraf", label:"Paragraf", html:"¶"},{type:"kutipan", label:"Kutipan", html:"❝"},{type:"footer", label:"Footer", html:"ab"},
    {type:"daftar", label:"Daftar", html:"☷"},{type:"foto", label:"Foto", html:icon.foto},{type:"slideshow", label:"Slideshow", html:icon.slideshow},{type:"audio", label:"Audio", html:icon.audio},
    {type:"peta", label:"Peta", html:icon.pin},{type:"kode", label:"Kode", html:"&lt;/&gt;"},{type:"math", label:"Math", html:"Σ"},{type:"tabel", label:"Tabel", html:icon.table},{type:"pembatas", label:"Pembatas", html:"—"}
  ];
  const blockDefsNew = [
    {type:"video", label:"Video", html:icon.video},{type:"animasi", label:"Animasi", html:"GIF"},{type:"suara", label:"P. Suara", html:icon.mic},{type:"pullquote", label:"Pull Quote", html:"❝..❞"},{type:"lipatan", label:"Lipatan", html:icon.fold},{type:"kolase", label:"Kolase", html:icon.collage}
  ];

  function makeId(){return "b" + Date.now().toString(36) + Math.random().toString(36).slice(2,8)}
  function escapeHtml(str){return String(str ?? "").replace(/[&<>'"]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","'":"&#039;",'"':"&quot;"}[m]))}
  function cleanText(el){return el.innerText.replace(/\n\n+$/g,"")}
  function nowTime(){const d=new Date();return String(d.getHours()).padStart(2,"0")+"."+String(d.getMinutes()).padStart(2,"0")}
  function blockText(b){if(b.type==="tabel")return (b.rows||[]).flat().join(" "); if(b.type==="lipatan")return [b.summary,b.text].filter(Boolean).join(" "); return b.text||""}
  function hasContent(){return state.blocks.some(b=>blockText(b).trim() || b.type==="pembatas") || state.buttons.some(btn=>btn.text.trim())}
  function defaultBlock(type){const id=makeId(); if(type==="judul")return {id,type,text:"",level:5}; if(type==="tabel")return {id,type,cols:2,rows:[["",""],["",""]],hasHeader:true}; if(type==="lipatan")return {id,type,summary:"",text:"",open:true}; if(type==="pembatas")return {id,type}; return {id,type,text:""}}
  function defaultButton(){return {id:makeId(),text:"",kind:"link",value:""}}
  function firstTitle(){const t=state.blocks.find(b=>b.type==="judul"&&String(b.text||"").trim());return t?t.text.trim():"Pesan baru"}

  function saveDraft(show){localStorage.setItem(STORAGE_KEY,JSON.stringify({time:Date.now(),blocks:state.blocks,buttons:state.buttons}));state.lastSavedAt=Date.now();if(show)showToast("Draft berhasil disimpan")}
  function loadDraft(){try{const raw=localStorage.getItem(STORAGE_KEY);if(!raw)return;const data=JSON.parse(raw);if(!data.time || Date.now()-data.time>DRAFT_TTL){localStorage.removeItem(STORAGE_KEY);return}state.blocks=Array.isArray(data.blocks)?data.blocks:[];state.buttons=Array.isArray(data.buttons)?data.buttons:[];state.lastSavedAt=data.time}catch(e){}}
  function showToast(msg){toast.textContent=msg;toast.classList.add("show");clearTimeout(showToast.t);showToast.t=setTimeout(()=>toast.classList.remove("show"),1700)}

  function render(){toolbar.classList.remove("show"); if(state.screen==="home")renderHome(); else renderBuilder()}
  function renderHome(){
    const hasDraft=state.blocks.length || getStoredDraft();
    screen.innerHTML=`<section class="home">
      <div class="home-head"><div class="brand-copy"><div class="brand-title">Tinta</div><div class="brand-sub">Studio posting untuk channel-mu</div></div><div class="home-tools"><button class="lang-pill"><span class="globe">◎</span><span>Indonesia</span></button><button class="theme-pill">◐</button></div></div>
      <button class="primary-big" id="newMessage"><span class="plus">+</span>Pesan Baru</button>
      <div class="section-row"><h2>CHANNEL-MU</h2><button class="manage-link">Kelola ›</button></div>
      <button class="channel-card" id="openBuilder"><div class="avatar">${CHANNEL.avatar}</div><div style="min-width:0;flex:1"><div class="channel-name">${CHANNEL.name}</div><div class="channel-sub">${CHANNEL.username} · ${CHANNEL.subs}</div></div><div class="chev-right">›</div></button>
      <div class="section-row"><h2>DRAFT TERAKHIR</h2></div>
      ${hasDraft?`<button class="draft-card-home" id="openDraft"><div class="draft-top"><span>${CHANNEL.name}</span><span>${nowTime()}</span></div><div class="draft-title">${escapeHtml(firstTitle())}</div><div class="draft-snippet">${escapeHtml(state.blocks.map(blockText).filter(Boolean).join(" · ")||"Konten draft tersimpan")}</div></button>`:`<div class="empty-draft">Belum ada draft. Mulai tulis sesuatu ✦</div>`}
    </section>`;
    document.getElementById("newMessage").onclick=()=>{state.blocks=[];state.buttons=[];state.screen="builder";state.mode="write";render()};
    document.getElementById("openBuilder").onclick=()=>{state.screen="builder";state.mode="write";render()};
    const od=document.getElementById("openDraft"); if(od)od.onclick=()=>{loadDraft();state.screen="builder";state.mode="write";render()};
  }
  function getStoredDraft(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY)||"null")}catch(e){return null}}

  function renderBuilder(){
    screen.innerHTML=`<section class="builder">
      <div class="channel-row"><button class="back-btn" id="backBtn">‹</button><button class="channel-pill"><span class="avatar">${CHANNEL.avatar}</span><span class="pill-name">${CHANNEL.name}</span><span class="caret">▼</span></button><div class="tabs"><button id="tabWrite" class="${state.mode==='write'?'active':''}">Tulis</button><button id="tabPreview" class="${state.mode==='preview'?'active':''}">Pratinjau</button></div></div>
      <div class="editor ${state.mode==='preview'?'preview-mode':''}" id="editor"></div>
      <div class="fab-wrap" id="fabWrap" style="display:${state.mode==='write'?'flex':'none'}"><button class="fab" id="addBlockFab"><span class="plus">+</span>Tambah Blok</button></div>
      <div class="builder-bottom"><button class="save-draft" id="saveDraft">Simpan Draft</button><button class="post-btn" id="postBtn" ${hasContent()?'':'disabled'}>POSTING</button></div>
    </section>`;
    document.getElementById("backBtn").onclick=()=>{state.screen="home";render()};
    document.getElementById("tabWrite").onclick=()=>{state.mode="write";render()};
    document.getElementById("tabPreview").onclick=()=>{state.mode="preview";render()};
    document.getElementById("addBlockFab").onclick=openSheet;
    document.getElementById("saveDraft").onclick=()=>saveDraft(true);
    document.getElementById("postBtn").onclick=()=>{if(!hasContent())return;saveDraft(false);showToast("Posting berhasil dibuat sesuai pratinjau")};
    if(state.mode==="write")renderWrite(); else renderPreview();
  }
  function renderWrite(){
    const el=document.getElementById("editor");
    if(!state.blocks.length){const empty=document.createElement("div");empty.className="empty-canvas";empty.textContent="Kanvas kosong — ketuk + Tambah Blok untuk mulai.";el.appendChild(empty)}
    state.blocks.forEach((b,idx)=>el.appendChild(makeBlock(b,idx)));
    const sep=document.createElement("div");sep.className="divider-line";el.appendChild(sep);
    const title=document.createElement("div");title.className="section-title";title.textContent="TOMBOL (INLINE)";el.appendChild(title);
    const desc=document.createElement("div");desc.className="section-desc";desc.textContent="Tombol muncul di bawah pesan: link, atau salin teks.";el.appendChild(desc);
    const list=document.createElement("div");list.className="button-list";state.buttons.forEach((btn,idx)=>list.appendChild(makeInlineButtonCard(btn,idx)));el.appendChild(list);
    const add=document.createElement("button");add.className="add-btn-dashed";add.innerHTML=`<span class="plus">+</span>Tambah tombol`;add.onclick=()=>{state.buttons.push(defaultButton());render()};el.appendChild(add);
  }
  function dragDots(){return `<div class="dots"><i></i><i></i><i></i><i></i><i></i><i></i></div>`}
  function dupIcon(){return `<svg viewBox="0 0 24 24"><rect x="8" y="8" width="11" height="11" rx="1.5"/><rect x="5" y="5" width="11" height="11" rx="1.5"/></svg>`}
  function xIcon(){return `<svg viewBox="0 0 24 24"><path d="M5 5l14 14M19 5L5 19"/></svg>`}
  function makeBlock(b,idx){const wrap=document.createElement("div");wrap.className="block-wrap";wrap.innerHTML=`<div class="drag">${dragDots()}</div>`;const card=document.createElement("div");card.className="block-card";const inner=document.createElement("div");inner.className="block-inner";card.appendChild(inner);if(b.type==="judul")buildTitle(inner,b);else if(b.type==="pembatas")buildDivider(inner);else if(b.type==="tabel")buildTable(inner,b);else if(b.type==="lipatan")buildFold(inner,b);else buildText(inner,b);if(!["tabel","lipatan"].includes(b.type))addActions(inner,b);wrap.appendChild(card);return wrap}
  function editable(cls,value,placeholder,oninput){const div=document.createElement("div");div.className=cls;div.contentEditable="true";div.spellcheck=false;div.dataset.placeholder=placeholder;div.innerText=value||"";div.addEventListener("input",()=>{oninput(cleanText(div));updatePostState()});div.addEventListener("focus",()=>toolbar.classList.add("show"));div.addEventListener("blur",()=>setTimeout(()=>toolbar.classList.remove("show"),130));return div}
  toolbar.addEventListener("mousedown",e=>e.preventDefault());toolbar.querySelectorAll("[data-cmd]").forEach(btn=>btn.onclick=()=>{try{document.execCommand(btn.dataset.cmd,false,btn.dataset.value||null)}catch(e){}});
  function buildTitle(inner,b){inner.appendChild(editable("rich-line title-line",b.text,"Judul...",v=>b.text=v));const lv=document.createElement("div");lv.className="level-panel";lv.innerHTML=`<div class="levels">${[1,2,3,4,5,6].map(n=>`<button data-lv="${n}" class="${b.level===n?'active':''}">H${n}</button>`).join("")}</div><div class="type-label">JUDUL H${b.level}</div>`;lv.querySelectorAll("button").forEach(btn=>btn.onclick=()=>{b.level=Number(btn.dataset.lv);render()});inner.appendChild(lv)}
  function buildText(inner,b){const names={paragraf:"Paragraf...",kutipan:"Kutipan...",footer:"Footer...",daftar:"Item daftar...",kode:"Kode...",math:"Rumus...",foto:"Caption foto...",slideshow:"Caption slideshow...",audio:"Caption audio...",peta:"Lokasi...",video:"Caption video...",animasi:"Caption animasi...",suara:"Pesan suara...",pullquote:"Pull quote...",kolase:"Caption kolase..."};let cls="rich-line text-line";if(b.type==="kutipan"||b.type==="pullquote")cls="rich-line quote-line";if(b.type==="footer")cls="rich-line footer-line";if(b.type==="kode")cls="rich-line code-line";inner.appendChild(editable(cls,b.text,names[b.type]||"Teks...",v=>b.text=v));const label=document.createElement("div");label.className="type-label";label.style.marginTop="16px";label.textContent=(b.type||"").replace("suara","P. SUARA").toUpperCase();inner.appendChild(label)}
  function buildDivider(inner){const rule=document.createElement("div");rule.className="rule-card";rule.innerHTML=`<div class="rule-line"></div><div class="rule-dot"></div><div class="rule-line"></div>`;inner.appendChild(rule);const label=document.createElement("div");label.className="type-label";label.style.marginTop="14px";label.textContent="PEMBATAS";inner.appendChild(label)}
  function buildTable(inner,b){b.cols=Math.max(1,b.cols||(b.rows?.[0]?.length||2));b.rows=Array.isArray(b.rows)&&b.rows.length?b.rows:[["",""]];b.rows.forEach(r=>{while(r.length<b.cols)r.push("");if(r.length>b.cols)r.splice(b.cols)});const grid=document.createElement("div");grid.className="table-grid";b.rows.forEach((row,ri)=>{const r=document.createElement("div");r.className="table-row"+(b.hasHeader&&ri===0?" header":"");r.style.gridTemplateColumns=`repeat(${b.cols}, minmax(0,1fr))`;row.forEach((cell,ci)=>{const inp=document.createElement("input");inp.className="table-cell";inp.value=cell;inp.oninput=()=>{b.rows[ri][ci]=inp.value;updatePostState()};r.appendChild(inp)});grid.appendChild(r)});inner.appendChild(grid);const tools=document.createElement("div");tools.className="table-tools";tools.innerHTML=`<button class="chip" data-act="addRow">+ Baris</button><button class="chip" data-act="delRow">− Baris</button><button class="chip" data-act="addCol">+ Kolom</button><button class="chip" data-act="delCol">− Kolom</button><button class="chip ${b.hasHeader?'active':''}" data-act="header">Header</button>`;tools.querySelectorAll("button").forEach(btn=>btn.onclick=()=>{const a=btn.dataset.act;if(a==="addRow")b.rows.push(Array.from({length:b.cols},()=>""));if(a==="delRow"&&b.rows.length>1)b.rows.pop();if(a==="addCol"){b.cols++;b.rows.forEach(r=>r.push(""))}if(a==="delCol"&&b.cols>1){b.cols--;b.rows.forEach(r=>r.pop())}if(a==="header")b.hasHeader=!b.hasHeader;render()});inner.appendChild(tools);const end=document.createElement("div");end.className="action-row-end";end.innerHTML=`<div class="type-label" style="margin-left:auto">TABEL</div><div class="right-actions"><button class="action-btn" data-act="dup">${dupIcon()} Duplikat</button><button class="action-btn danger" data-act="del">${xIcon()} Hapus</button></div>`;end.querySelector('[data-act="dup"]').onclick=()=>duplicateBlock(b);end.querySelector('[data-act="del"]').onclick=()=>deleteBlock(b.id);inner.appendChild(end)}
  function buildFold(inner,b){const box=document.createElement("div");box.className="fold-box";const head=document.createElement("div");head.className="fold-head";head.innerHTML=`<span class="triangle">${b.open?'▼':'▶'}</span>`;head.appendChild(editable("fold-title",b.summary,"Judul (selalu terlihat)",v=>b.summary=v));box.appendChild(head);const body=document.createElement("div");body.className="fold-body";body.style.display=b.open?"block":"none";body.appendChild(editable("fold-text",b.text,"Isi tersembunyi",v=>b.text=v));box.appendChild(body);inner.appendChild(box);const end=document.createElement("div");end.className="action-row-end";end.innerHTML=`<button class="action-btn" data-act="toggle">${b.open?'▲ Tutup':'▼ Buka'}</button><div class="type-label" style="margin-left:auto">LIPATAN</div><div class="right-actions"><button class="action-btn" data-act="dup">${dupIcon()} Duplikat</button><button class="action-btn danger" data-act="del">${xIcon()} Hapus</button></div>`;end.querySelector('[data-act="toggle"]').onclick=()=>{b.open=!b.open;render()};end.querySelector('[data-act="dup"]').onclick=()=>duplicateBlock(b);end.querySelector('[data-act="del"]').onclick=()=>deleteBlock(b.id);inner.appendChild(end)}
  function addActions(inner,b){const actions=document.createElement("div");actions.className="block-actions";actions.innerHTML=`<button class="action-btn" data-act="dup">${dupIcon()} Duplikat</button><button class="action-btn danger" data-act="del">${xIcon()} Hapus</button>`;actions.querySelector('[data-act="dup"]').onclick=()=>duplicateBlock(b);actions.querySelector('[data-act="del"]').onclick=()=>deleteBlock(b.id);inner.appendChild(actions)}
  function duplicateBlock(b){const copy=JSON.parse(JSON.stringify(b));copy.id=makeId();const idx=state.blocks.findIndex(x=>x.id===b.id);state.blocks.splice(idx+1,0,copy);render()}
  function deleteBlock(id){state.blocks=state.blocks.filter(b=>b.id!==id);render()}
  function updatePostState(){const btn=document.getElementById("postBtn");if(btn)btn.disabled=!hasContent()}

  function makeInlineButtonCard(btn,idx){const card=document.createElement("div");card.className="inline-card";card.innerHTML=`<div class="inline-grid"><input class="field" data-field="text" placeholder="Teks tombol" value="${escapeHtml(btn.text)}"><select class="field" data-field="kind"><option value="link" ${btn.kind==='link'?'selected':''}>Link</option><option value="copy" ${btn.kind==='copy'?'selected':''}>Salin</option></select></div><input class="field" data-field="value" placeholder="URL atau teks yang disalin" value="${escapeHtml(btn.value)}"><div class="inline-actions"><div class="type-label">TOMBOL INLINE</div><div class="right-actions"><button class="action-btn" data-act="dup">${dupIcon()} Duplikat</button><button class="action-btn danger" data-act="del">${xIcon()} Hapus</button></div></div>`;card.querySelectorAll("[data-field]").forEach(el=>el.oninput=el.onchange=()=>{btn[el.dataset.field]=el.value;updatePostState()});card.querySelector('[data-act="dup"]').onclick=()=>{const copy=JSON.parse(JSON.stringify(btn));copy.id=makeId();state.buttons.splice(idx+1,0,copy);render()};card.querySelector('[data-act="del"]').onclick=()=>{state.buttons=state.buttons.filter(x=>x.id!==btn.id);render()};return card}

  function renderPreview(){const el=document.getElementById("editor");const wrap=document.createElement("div");wrap.className="preview-wrap";wrap.innerHTML=`<div class="day-pill">Hari ini</div>`;const bubble=document.createElement("article");bubble.className="bubble";bubble.innerHTML=`<div class="bubble-from">${CHANNEL.name}</div>`;const content=document.createElement("div");content.className="bubble-content";content.innerHTML=state.blocks.map(renderBlockPreview).join("") || `<p style="color:#8296ac">Belum ada isi pesan.</p>`;bubble.appendChild(content);if(state.buttons.some(b=>b.text.trim())){const btnWrap=document.createElement("div");btnWrap.className="inline-preview";state.buttons.filter(b=>b.text.trim()).forEach(b=>{if(b.kind==="link"){const a=document.createElement("a");a.href=b.value||"#";a.target="_blank";a.rel="noopener";a.textContent=b.text;btnWrap.appendChild(a)}else{const bt=document.createElement("button");bt.textContent=b.text;bt.onclick=()=>{navigator.clipboard?.writeText(b.value||"");showToast("Teks tombol disalin")};btnWrap.appendChild(bt)}});bubble.appendChild(btnWrap)}const meta=document.createElement("div");meta.className="bubble-meta";meta.innerHTML=`<span class="eye"></span><span>2,1 rb</span><span>${nowTime()}</span>`;bubble.appendChild(meta);wrap.appendChild(bubble);el.appendChild(wrap)}
  function renderBlockPreview(b){const text=escapeHtml(b.text||"");if(b.type==="judul"&&text.trim()){const lvl=Math.min(6,Math.max(1,Number(b.level)||5));return `<h${lvl}>${text.replace(/\n/g,"<br>")}</h${lvl}>`}if(b.type==="paragraf"&&text.trim())return `<p>${text.replace(/\n/g,"<br>")}</p>`;if((b.type==="kutipan"||b.type==="pullquote")&&text.trim())return `<blockquote>${text.replace(/\n/g,"<br>")}</blockquote>`;if(b.type==="footer"&&text.trim())return `<p class="footer">${text.replace(/\n/g,"<br>")}</p>`;if(b.type==="kode"&&text.trim())return `<pre class="code-line" style="white-space:pre-wrap;margin:0 0 16px">${text}</pre>`;if(["daftar","math","foto","slideshow","audio","peta","video","animasi","suara","kolase"].includes(b.type)&&text.trim())return `<p>${text.replace(/\n/g,"<br>")}</p>`;if(b.type==="pembatas")return `<div class="preview-rule"><div class="line"></div><div class="dot"></div><div class="line"></div></div>`;if(b.type==="tabel")return previewTable(b);if(b.type==="lipatan")return previewFold(b);return ""}
  function previewTable(b){const rows=(b.rows||[]).map(r=>r.map(escapeHtml));if(!rows.length)return "";let out=`<table class="preview-table">`;if(b.hasHeader){out+=`<thead><tr>${rows[0].map(c=>`<th>${c}</th>`).join("")}</tr></thead>`;const bodyRows=rows.slice(1);if(bodyRows.length)out+=`<tbody>${bodyRows.map(r=>`<tr>${r.map(c=>`<td>${c}</td>`).join("")}</tr>`).join("")}</tbody>`}else{out+=`<tbody>${rows.map(r=>`<tr>${r.map(c=>`<td>${c}</td>`).join("")}</tr>`).join("")}</tbody>`}return out+`</table>`}
  function previewFold(b){const summary=escapeHtml(b.summary||"Lihat lebih banyak");const text=escapeHtml(b.text||"").replace(/\n/g,"<br>");return `<details class="preview-details" ${b.open?"open":""}><summary>${summary}</summary><div class="details-body">${text||"&nbsp;"}</div></details>`}

  function openSheet(){overlay.classList.add("open")}
  function closeSheet(){overlay.classList.remove("open")}
  overlay.addEventListener("click",e=>{if(e.target===overlay)closeSheet()});
  function buildSheetGrid(container,defs){container.innerHTML="";defs.forEach(def=>{const btn=document.createElement("button");btn.className="block-opt";btn.innerHTML=`<div class="block-ic">${def.html}</div><span>${def.label}</span>`;btn.onclick=()=>{state.blocks.push(defaultBlock(def.type));closeSheet();render();setTimeout(()=>{const e=document.getElementById("editor");if(e)e.scrollTop=e.scrollHeight},40)};container.appendChild(btn)})}
  document.getElementById("topClose").onclick=()=>{state.screen=state.screen==="builder"?"home":"builder";render()};
  buildSheetGrid(document.getElementById("blockGridTop"),blockDefsTop);
  buildSheetGrid(document.getElementById("blockGridNew"),blockDefsNew);
  loadDraft();
  render();
})();
</script>
</body>
