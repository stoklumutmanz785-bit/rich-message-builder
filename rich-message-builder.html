<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>Rich Message Builder</title>
<style>
  :root {
    --bg: #0e1621;
    --panel: #182533;
    --panel2: #1c2736;
    --line: #2b3543;
    --text: #ffffff;
    --sub: #7a8b9a;
    --accent: #2AABEE;
    --danger: #ff5c5c;
    --danger-bg: #2a1418;
    --radius: 12px;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    display: flex;
    justify-content: center;
  }
  #app {
    width: 100%;
    max-width: 480px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    position: relative;
    background: var(--bg);
  }

  /* ---------- Top bar ---------- */
  .topbar {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 16px;
    background: #000000;
  }
  .topbar .icon-btn {
    background: none; border: none; color: var(--text); font-size: 22px; line-height: 1; cursor: pointer; padding: 4px;
  }
  .topbar h1 {
    flex: 1; font-size: 19px; margin: 0; font-weight: 700; letter-spacing: 0.2px;
  }
  .topbar .right { display: flex; align-items: center; gap: 14px; }

  .banner {
    background: #161b22;
    color: #c9d1d9;
    font-size: 13px;
    line-height: 1.45;
    padding: 12px 16px;
    border-bottom: 1px solid #000;
  }
  .banner b { color: #fff; }

  /* ---------- Header / Channel Row ---------- */
  .channel-row {
    display: flex; align-items: center; gap: 8px;
    padding: 12px 14px;
    background: #0e1621;
    border-bottom: 1px solid var(--line);
  }
  .channel-row .back { background: none; border: none; color: var(--accent); font-size: 18px; cursor: pointer; }
  .channel-pill {
    display: flex; align-items: center; gap: 8px;
    background: #182533; padding: 4px 12px 4px 4px;
    border-radius: 20px; flex-shrink: 0;
  }
  .avatar {
    width: 28px; height: 28px; border-radius: 50%;
    background: linear-gradient(135deg, #2AABEE, #1a7fb5);
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 14px; color: #fff;
  }
  .channel-meta .name { font-weight: 600; font-size: 14px; color: var(--text); }
  .channel-dropdown { font-size: 10px; color: var(--sub); margin-left: 2px; }

  .spacer { flex: 1; }

  .tabs {
    display: flex; background: #121d28; border-radius: 20px; padding: 3px; flex-shrink: 0;
  }
  .tabs button {
    border: none; background: transparent; color: var(--sub);
    font-size: 13px; font-weight: 600; padding: 6px 14px; border-radius: 18px; cursor: pointer;
  }
  .tabs button.active { background: var(--accent); color: #fff; }

  /* ---------- Editor Body ---------- */
  .editor { flex: 1; overflow-y: auto; padding-bottom: 220px; }
  .editor.preview-mode {
    background-color: #0e1621;
    background-image: radial-gradient(#2b3543 1px, transparent 1px);
    background-size: 20px 20px;
  }

  .block-card-wrap {
    display: flex;
    margin: 10px 14px;
    background: transparent;
  }
  .drag-handle {
    width: 24px; color: #435263; font-size: 18px; line-height: 8px;
    display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
    padding-top: 16px; cursor: grab; letter-spacing: 2px; writing-mode: vertical-lr;
  }
  
  .block-card {
    flex: 1;
    background: var(--panel);
    border-radius: var(--radius);
    border: 1px solid var(--line);
    overflow: hidden;
  }
  
  .block-card .b-body { padding: 14px 14px 12px; }
  
  .block-card input[type=text],
  .block-card textarea {
    width: 100%; background: transparent; border: none; color: var(--text);
    font-size: 17px; font-weight: 600; font-family: inherit; resize: none; outline: none; padding: 6px 0;
  }
  .block-card input::placeholder, .block-card textarea::placeholder { color: #5b6472; font-weight: 500; }
  
  /* Levels (H1-H6) */
  .level-row-wrap {
    display: flex; align-items: center; justify-content: space-between; margin-top: 10px;
  }
  .level-row { display: flex; gap: 4px; }
  .level-row button {
    border: none; border-radius: 6px; padding: 6px 10px; font-size: 12px; font-weight: 700; cursor: pointer;
    background: #233140; color: var(--sub);
  }
  .level-row button.active { background: var(--accent); color: #fff; }
  .b-type-label { font-size: 10px; letter-spacing: 0.5px; color: var(--sub); font-weight: 700; text-transform: uppercase; }

  /* Actions inside block */
  .b-actions { display: flex; gap: 8px; margin-top: 12px; }
  .action-btn {
    background: #233140; border: none; color: var(--text); padding: 8px 12px;
    border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 6px;
  }
  .action-btn.danger { color: var(--danger); background: rgba(255, 92, 92, 0.1); }

  /* Tables */
  .table-grid { display: flex; flex-direction: column; gap: 6px; }
  .table-row { display: flex; gap: 0; border: 1px solid var(--line); border-radius: 8px; overflow: hidden; }
  .table-row input { 
    flex: 1; background: #121d28; border: none; padding: 10px 12px; font-size: 14px; font-weight: normal; 
    border-right: 1px solid var(--line);
  }
  .table-row input:last-child { border-right: none; }
  .table-row.is-header input { background: #1c2a3a; font-weight: 600; }
  
  .table-ctrl-row { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
  .table-ctrl-row .chip-btn {
    background: #233140; border: none; color: #fff; padding: 6px 12px; border-radius: 6px; font-size: 12px; font-weight: 600;
  }
  .table-ctrl-row .chip-btn.active { background: var(--accent); }

  /* Lipatan details */
  .lipatan-wrap { background: #121d28; border-radius: 8px; overflow: hidden; border: 1px solid var(--line); }
  .lipatan-header { display: flex; align-items: center; padding: 0 10px; border-bottom: 1px solid var(--line); }
  .lipatan-header .icon { color: var(--sub); font-size: 10px; margin-right: 6px; }
  .lipatan-body { padding: 0 10px; }
  .lipatan-wrap input { font-size: 15px !important; font-weight: 500 !important; }

  /* Buttons Section */
  .section-title {
    padding: 14px 16px 4px; font-size: 12px; font-weight: 700; color: var(--sub);
    text-transform: uppercase; letter-spacing: 0.6px;
  }
  .section-desc { padding: 0 16px 12px; font-size: 13px; color: var(--sub); line-height: 1.4; }

  .add-btn-dashed {
    margin: 0 16px 24px; border: 1px dashed #435263; border-radius: 12px;
    padding: 16px; text-align: center; color: var(--accent); font-weight: 600; font-size: 14px; cursor: pointer;
  }

  /* Floating Add Block */
  .floating-add-wrap {
    position: fixed; bottom: 124px; width: 100%; max-width: 480px;
    display: flex; justify-content: center; z-index: 40; pointer-events: none;
  }
  .floating-add-btn {
    pointer-events: auto;
    background: #182533; border: 1px solid #2b3543; color: var(--accent);
    font-weight: 600; font-size: 14px; padding: 12px 24px; border-radius: 24px; cursor: pointer;
    display: flex; align-items: center; gap: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
  }

  /* ---------- Bottom bar ---------- */
  .bottombar {
    position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 100%; max-width: 480px; background: #0e1621; z-index: 50;
  }
  .save-draft {
    text-align: center; color: var(--accent); font-weight: 600; font-size: 14px; padding: 14px;
    cursor: pointer; background: #121d28; border-top: 1px solid var(--line);
  }
  .post-btn {
    display: block; width: 100%; background: var(--accent); color: #fff; border: none;
    font-size: 16px; font-weight: 700; padding: 16px; cursor: pointer; letter-spacing: 0.5px;
  }

  /* ---------- Bottom sheets ---------- */
  .sheet-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: none; align-items: flex-end; justify-content: center; z-index: 100;
  }
  .sheet-overlay.open { display: flex; }
  .sheet {
    background: #182533; width: 100%; max-width: 480px; border-radius: 20px 20px 0 0;
    max-height: 82vh; overflow-y: auto; padding: 10px 16px 24px;
  }
  .sheet-handle { width: 36px; height: 4px; background: #435263; border-radius: 3px; margin: 6px auto 14px; }
  .sheet h2 { font-size: 18px; margin: 0 0 16px; font-weight: 700; }
  .block-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px 8px; }
  
  .block-opt { 
    background: none; border: none; color: var(--text); display: flex; flex-direction: column; 
    align-items: center; gap: 8px; cursor: pointer; padding: 4px 0; 
  }
  .block-opt .ic {
    width: 56px; height: 56px; border-radius: 16px; background: #233140; color: var(--accent);
    display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: bold;
  }
  .block-opt span { font-size: 12px; color: #7a8b9a; text-align: center; font-weight: 500; }

  /* ---------- Preview ---------- */
  .preview-wrap { padding: 16px; }
  .preview-day {
    text-align: center; color: #fff; font-size: 12px; background: rgba(24, 37, 51, 0.6);
    padding: 4px 10px; border-radius: 12px; display: table; margin: 6px auto 16px; font-weight: 500;
  }
  .bubble {
    background: #182533; border-radius: 14px; padding: 12px 14px 6px; max-width: 90%; margin-bottom: 12px; position: relative;
  }
  .bubble .from { color: var(--accent); font-weight: 600; font-size: 14px; margin-bottom: 6px; }
  .bubble-content { font-size: 15px; line-height: 1.4; color: #eef2f6; word-wrap: break-word; }
  
  .bubble-content h1, .bubble-content h2, .bubble-content h3, .bubble-content h4, .bubble-content h5 {
    margin: 8px 0 4px; color: #fff; font-weight: 700; line-height: 1.3;
  }
  .bubble-content h5 { font-size: 15px; }
  .bubble-content hr { border: none; border-top: 1px solid #33414f; margin: 12px 0; }
  
  .bubble-content table {
    width: 100%; border-collapse: collapse; margin: 8px 0; font-size: 14px;
    border: 1px solid #2b3543; border-radius: 8px; overflow: hidden; border-style: hidden; box-shadow: 0 0 0 1px #2b3543;
  }
  .bubble-content th, .bubble-content td {
    border: 1px solid #2b3543; padding: 8px 10px; text-align: left; vertical-align: top;
  }
  .bubble-content th { background: rgba(255, 255, 255, 0.05); font-weight: 600; }
  
  .bubble-content details { background: #121d28; border-radius: 8px; margin: 8px 0; overflow: hidden; border: 1px solid var(--line); }
  .bubble-content details summary { 
    cursor: pointer; color: #fff; font-size: 14px; font-weight: 600; padding: 10px 12px; background: #182533; 
    border-bottom: 1px solid var(--line);
  }
  .bubble-content details .det-body { padding: 10px 12px; font-size: 14px; }

  .bubble-meta {
    display: flex; justify-content: flex-end; align-items: center; gap: 4px;
    color: var(--sub); font-size: 11px; margin-top: 4px; margin-bottom: 2px;
  }

  .toast {
    position: fixed; bottom: 140px; left: 50%; transform: translateX(-50%);
    background: #eef2f6; color: #000; padding: 10px 20px; border-radius: 20px; font-size: 14px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3); z-index: 200; text-align: center; font-weight: 500;
  }
</style>
</head>
<body>
<div id="app">
  <div class="topbar">
    <button class="icon-btn" id="closeBtn">✕</button>
    <h1>Rich Message Builder</h1>
    <div class="right">
      <button class="icon-btn">˅</button>
      <button class="icon-btn">⋮</button>
    </div>
  </div>
  
  <div class="banner" id="banner">
    ⏳ Draft & pesan terkirim hanya disimpan <b>maksimal 30 menit</b> di server, lalu dihapus otomatis.
  </div>
  
  <div class="channel-row">
    <button class="back">‹</button>
    <div class="channel-pill">
      <div class="avatar">W</div>
      <span class="name">With Kinn</span>
      <span class="channel-dropdown">▾</span>
    </div>
    <div class="spacer"></div>
    <div class="tabs">
      <button id="tabWrite" class="active">Tulis</button>
      <button id="tabPreview">Pratinjau</button>
    </div>
  </div>
  
  <div class="editor" id="editor"></div>
  
  <div class="floating-add-wrap" id="floatingAddWrap">
    <button class="floating-add-btn" id="fabAddBlock">+ Tambah Blok</button>
  </div>

  <div class="bottombar">
    <div class="save-draft" id="saveDraftBtn">Simpan Draft</div>
    <button class="post-btn" id="postBtn">POSTING</button>
  </div>
</div>

<div class="sheet-overlay" id="addSheetOverlay">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <h2>Tambah Blok</h2>
    <div class="block-grid" id="blockGrid"></div>
  </div>
</div>

<script>
(function(){
  "use strict";

  const state = { mode: "write", blocks: [] };

  const BLOCK_DEFS = [
    {type:"judul", label:"Judul", icon:"H"},
    {type:"paragraf", label:"Paragraf", icon:"¶"},
    {type:"kutipan", label:"Kutipan", icon:"❝"},
    {type:"footer", label:"Footer", icon:"ab"},
    {type:"daftar", label:"Daftar", icon:"≣"},
    {type:"foto", label:"Foto", icon:"🖼"},
    {type:"slideshow", label:"Slideshow", icon:"◫"},
    {type:"audio", label:"Audio", icon:"ılı"},
    {type:"peta", label:"Peta", icon:"📍"},
    {type:"kode", label:"Kode", icon:"</>"},
    {type:"math", label:"Math", icon:"∑"},
    {type:"tabel", label:"Tabel", icon:"⊞"},
    {type:"pembatas", label:"Pembatas", icon:"—"},
    {type:"video", label:"Video", icon:"📹"},
    {type:"animasi", label:"Animasi", icon:"GIF"},
    {type:"suara", label:"P. Suara", icon:"🎤"},
    {type:"pullquote", label:"Pull Quote", icon:"❝❞"},
    {type:"lipatan", label:"Lipatan", icon:"✉"},
    {type:"kolase", label:"Kolase", icon:"⚏"}
  ];

  function defaultBlock(type) {
    const id = "b" + Date.now() + Math.random();
    switch(type) {
      case "judul": return {id, type, text: "", level: 5};
      case "tabel": return {id, type, rows: [["",""],["",""]], hasHeader: true};
      case "lipatan": return {id, type, summary: "", text: ""};
      case "pembatas": return {id, type};
      default: return {id, type, text: ""};
    }
  }

  document.getElementById("tabWrite").onclick = () => switchMode("write");
  document.getElementById("tabPreview").onclick = () => switchMode("preview");
  document.getElementById("fabAddBlock").onclick = () => document.getElementById("addSheetOverlay").classList.add("open");
  
  document.getElementById("addSheetOverlay").addEventListener("click", e => {
    if(e.target.id === "addSheetOverlay") e.target.classList.remove("open");
  });

  const blockGrid = document.getElementById("blockGrid");
  BLOCK_DEFS.forEach(def => {
    const opt = document.createElement("button");
    opt.className = "block-opt";
    opt.innerHTML = `<div class="ic">${def.icon}</div><span>${def.label}</span>`;
    opt.onclick = () => {
      state.blocks.push(defaultBlock(def.type));
      document.getElementById("addSheetOverlay").classList.remove("open");
      renderEditor();
    };
    blockGrid.appendChild(opt);
  });

  function switchMode(m) {
    state.mode = m;
    document.getElementById("tabWrite").classList.toggle("active", m==="write");
    document.getElementById("tabPreview").classList.toggle("active", m==="preview");
    
    if(m === "write") {
        document.getElementById("editor").classList.remove("preview-mode");
        document.getElementById("floatingAddWrap").style.display = "flex";
    } else {
        document.getElementById("editor").classList.add("preview-mode");
        document.getElementById("floatingAddWrap").style.display = "none";
    }
    renderEditor();
  }

  function renderEditor() {
    const editorEl = document.getElementById("editor");
    editorEl.innerHTML = "";
    
    if(state.mode === "preview") { 
        renderPreview(); 
        return; 
    }

    state.blocks.forEach((b, idx) => editorEl.appendChild(buildBlockCard(b, idx)));

    // Tombol Inline UI
    const tombolTitle = document.createElement("div");
    tombolTitle.className = "section-title";
    tombolTitle.innerText = "TOMBOL (INLINE)";
    editorEl.appendChild(tombolTitle);

    const tombolDesc = document.createElement("div");
    tombolDesc.className = "section-desc";
    tombolDesc.innerText = "Tombol muncul di bawah pesan: link, atau salin teks.";
    editorEl.appendChild(tombolDesc);

    const addTombolBtn = document.createElement("div");
    addTombolBtn.className = "add-btn-dashed";
    addTombolBtn.innerText = "+ Tambah tombol";
    editorEl.appendChild(addTombolBtn);
  }

  function buildBlockCard(block, idx) {
    const wrap = document.createElement("div");
    wrap.className = "block-card-wrap";
    
    const handle = document.createElement("div");
    handle.className = "drag-handle";
    handle.innerText = "⋮⋮";
    wrap.appendChild(handle);

    const card = document.createElement("div");
    card.className = "block-card";
    const body = document.createElement("div");
    body.className = "b-body";
    card.appendChild(body);

    if (block.type === "judul") {
      const inp = document.createElement("input");
      inp.type = "text"; inp.placeholder = "Judul..."; inp.value = block.text;
      inp.oninput = () => block.text = inp.value;
      body.appendChild(inp);

      const lvlRowWrap = document.createElement("div");
      lvlRowWrap.className = "level-row-wrap";
      
      const lvlRow = document.createElement("div");
      lvlRow.className = "level-row";
      [1,2,3,4,5,6].forEach(n => {
        const btn = document.createElement("button");
        btn.innerText = "H" + n;
        if(block.level === n) btn.className = "active";
        btn.onclick = () => { block.level = n; renderEditor(); };
        lvlRow.appendChild(btn);
      });
      
      const lbl = document.createElement("div");
      lbl.className = "b-type-label";
      lbl.innerText = "JUDUL H" + block.level;
      
      lvlRowWrap.appendChild(lvlRow);
      lvlRowWrap.appendChild(lbl);
      body.appendChild(lvlRowWrap);

    } else if (block.type === "tabel") {
      const grid = document.createElement("div");
      grid.className = "table-grid";
      block.rows.forEach((row, ri) => {
        const rEl = document.createElement("div");
        rEl.className = "table-row" + (block.hasHeader && ri === 0 ? " is-header" : "");
        row.forEach((cell, ci) => {
          const inp = document.createElement("input");
          inp.type = "text"; inp.value = cell;
          inp.placeholder = (block.hasHeader && ri===0) ? `Header ${ci+1}` : `R${ri+1}K${ci+1}`;
          inp.oninput = () => block.rows[ri][ci] = inp.value;
          rEl.appendChild(inp);
        });
        grid.appendChild(rEl);
      });
      body.appendChild(grid);

      const ctrl = document.createElement("div");
      ctrl.className = "table-ctrl-row";
      ctrl.innerHTML = `
        <button class="chip-btn" id="addRow">+ Baris</button>
        <button class="chip-btn" id="delRow">− Baris</button>
        <button class="chip-btn" id="addCol">+ Kolom</button>
        <button class="chip-btn" id="delCol">− Kolom</button>
        <button class="chip-btn ${block.hasHeader ? 'active':''}" id="hdrToggle">Header</button>
      `;
      ctrl.querySelector("#addRow").onclick = () => { block.rows.push(new Array(block.rows[0].length).fill("")); renderEditor(); };
      ctrl.querySelector("#addCol").onclick = () => { block.rows.forEach(r => r.push("")); renderEditor(); };
      ctrl.querySelector("#hdrToggle").onclick = () => { block.hasHeader = !block.hasHeader; renderEditor(); };
      body.appendChild(ctrl);
    } else if (block.type === "pembatas") {
        const hr = document.createElement("hr");
        hr.style.border = "none"; hr.style.borderTop = "1px solid #2b3543";
        body.appendChild(hr);
    } else if (block.type === "lipatan") {
        const lipWrap = document.createElement("div");
        lipWrap.className = "lipatan-wrap";
        
        const lipHead = document.createElement("div");
        lipHead.className = "lipatan-header";
        lipHead.innerHTML = `<span class="icon">▼</span>`;
        const sumInp = document.createElement("input");
        sumInp.type = "text"; sumInp.placeholder = "Judul (selalu terlihat)"; sumInp.value = block.summary;
        sumInp.oninput = () => block.summary = sumInp.value;
        lipHead.appendChild(sumInp);

        const lipBody = document.createElement("div");
        lipBody.className = "lipatan-body";
        const txtInp = document.createElement("input");
        txtInp.type = "text"; txtInp.placeholder = "Isi tersembunyi"; txtInp.value = block.text;
        txtInp.oninput = () => block.text = txtInp.value;
        lipBody.appendChild(txtInp);

        lipWrap.appendChild(lipHead);
        lipWrap.appendChild(lipBody);
        body.appendChild(lipWrap);
        
        const tutupBtn = document.createElement("button");
        tutupBtn.className = "action-btn"; tutupBtn.style.marginTop = "10px";
        tutupBtn.innerHTML = `▲ Tutup <span style="margin-left:auto;font-size:10px;color:var(--sub);letter-spacing:1px;font-weight:700;">LIPATAN</span>`;
        body.appendChild(tutupBtn);
    }

    const actions = document.createElement("div");
    actions.className = "b-actions";
    
    const dupBtn = document.createElement("button");
    dupBtn.className = "action-btn";
    dupBtn.innerHTML = `⧉ Duplikat`;
    dupBtn.onclick = () => {
      const copy = JSON.parse(JSON.stringify(block));
      copy.id = "b" + Date.now();
      state.blocks.splice(idx + 1, 0, copy); renderEditor();
    };
    
    const delBtn = document.createElement("button");
    delBtn.className = "action-btn danger";
    delBtn.innerHTML = `✕ Hapus`;
    delBtn.onclick = () => { state.blocks.splice(idx, 1); renderEditor(); };
    
    actions.appendChild(dupBtn);
    actions.appendChild(delBtn);
    body.appendChild(actions);

    wrap.appendChild(card);
    return wrap;
  }

  function renderPreview() {
    const wrap = document.createElement("div");
    wrap.className = "preview-wrap";
    wrap.innerHTML = `<div class="preview-day">Hari ini</div>`;
    
    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.innerHTML = `<div class="from">With Kinn</div>`;
    
    const content = document.createElement("div");
    content.className = "bubble-content";
    
    state.blocks.forEach(b => {
      if (b.type === "judul" && b.text) {
        content.innerHTML += `<h${b.level}>${b.text}</h${b.level}>`;
      } else if (b.type === "tabel") {
        let html = "<table>";
        if (b.hasHeader && b.rows.length > 0) {
          html += "<thead><tr>" + b.rows[0].map(c => `<th>${c}</th>`).join("") + "</tr></thead>";
          const bRows = b.rows.slice(1);
          if (bRows.length) html += "<tbody>" + bRows.map(r => "<tr>" + r.map(c => `<td>${c}</td>`).join("") + "</tr>").join("") + "</tbody>";
        } else {
          html += "<tbody>" + b.rows.map(r => "<tr>" + r.map(c => `<td>${c}</td>`).join("") + "</tr>").join("") + "</tbody>";
        }
        html += "</table>";
        content.innerHTML += html;
      } else if (b.type === "pembatas") {
        content.innerHTML += `<hr>`;
      } else if (b.type === "lipatan" && b.text) {
        const sum = b.summary || "Lihat lebih banyak";
        content.innerHTML += `<details><summary>▶ ${sum}</summary><div class="det-body">${b.text}</div></details>`;
      }
    });
    
    bubble.appendChild(content);
    
    const meta = document.createElement("div");
    meta.className = "bubble-meta";
    meta.innerHTML = `👁 2,1 rb 05.33`;
    bubble.appendChild(meta);
    
    wrap.appendChild(bubble);
    document.getElementById("editor").appendChild(wrap);
  }
})();
</script>
</body>
</html>
